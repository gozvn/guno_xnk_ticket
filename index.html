<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUNO — XNK Tickets</title>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f14;
            --surface: #13161e;
            --border: #1e2330;
            --accent: #6cc56e;
            --accent2: #3b82f6;
            --danger: #e74c3c;
            --text: #e8ecf4;
            --muted: #5a6177;
            --card: #171a24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            border-bottom: 1px solid var(--border);
            padding: 18px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
        }

        .header-logo {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            color: var(--accent);
            text-transform: uppercase;
        }

        .header-logo span {
            color: var(--muted);
            font-weight: 400;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .badge-live {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent);
            background: rgba(108, 197, 110, 0.08);
            border: 1px solid rgba(108, 197, 110, 0.2);
            padding: 4px 10px;
            border-radius: 4px;
        }

        .badge-live::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .btn-refresh {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-refresh:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* STATS BAR */
        .stats-bar {
            display: flex;
            gap: 1px;
            background: var(--border);
            border-bottom: 1px solid var(--border);
        }

        .stat-item {
            background: var(--surface);
            padding: 16px 28px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text);
        }

        .stat-value.green {
            color: var(--accent);
        }

        .stat-value.blue {
            color: var(--accent2);
        }

        /* MAIN */
        .main {
            padding: 28px 32px;
        }

        /* TOOLBAR */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-box {
            flex: 1;
            max-width: 320px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            outline: none;
            transition: border-color 0.15s;
        }

        .search-box:focus {
            border-color: var(--accent);
        }

        .search-box::placeholder {
            color: var(--muted);
        }

        .filter-select {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
        }

        .count-tag {
            margin-left: auto;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
        }

        /* TABLE */
        .table-wrap {
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: var(--surface);
            border-bottom: 2px solid var(--border);
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
            cursor: pointer;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background: var(--surface);
        }

        td {
            padding: 13px 16px;
            font-size: 0.85rem;
            vertical-align: middle;
        }

        .td-id {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            color: var(--muted);
        }

        .td-code {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent2);
        }

        .td-total {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--accent);
            font-family: 'IBM Plex Mono', monospace;
        }

        .td-date {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.72rem;
            color: var(--muted);
        }

        .td-source {
            font-size: 0.78rem;
            color: var(--text);
        }

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 0.05em;
        }

        .status-null {
            background: rgba(90, 97, 119, 0.2);
            color: var(--muted);
            border: 1px solid rgba(90, 97, 119, 0.3);
        }

        .status-active {
            background: rgba(108, 197, 110, 0.1);
            color: var(--accent);
            border: 1px solid rgba(108, 197, 110, 0.25);
        }

        .status-pending {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.25);
        }

        .btn-preview {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.68rem;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-preview:hover {
            border-color: var(--accent2);
            color: var(--accent2);
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 999;
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 90%;
            max-width: 760px;
            max-height: 85vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.2s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent2);
            font-family: 'IBM Plex Mono', monospace;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.2rem;
            cursor: pointer;
            line-height: 1;
            transition: color 0.15s;
        }

        .modal-close:hover {
            color: var(--text);
        }

        .modal-body {
            overflow-y: auto;
            padding: 20px;
            flex: 1;
            background: #fff;
        }

        /* EMPTY / LOADING */
        .state-box {
            padding: 60px;
            text-align: center;
            color: var(--muted);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
        }

        .state-box .icon {
            font-size: 2rem;
            margin-bottom: 12px;
            display: block;
        }

        /* PAGINATION */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            margin-top: 20px;
        }

        .page-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.12s;
        }

        .page-btn:hover,
        .page-btn.active {
            border-color: var(--accent);
            color: var(--accent);
        }

        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .error-msg {
            background: rgba(231, 76, 60, 0.08);
            border: 1px solid rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            padding: 12px 16px;
            border-radius: 8px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.78rem;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-logo">GUNO <span>/ XNK Tickets</span></div>
        <div class="header-right">
            <div class="badge-live">LIVE DB</div>
            <button class="btn-refresh" onclick="loadData()">↺ Refresh</button>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-label">Total Tickets</div>
            <div class="stat-value" id="stat-total">—</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Grand Total (SL)</div>
            <div class="stat-value green" id="stat-qty">—</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Nguồn</div>
            <div class="stat-value blue" id="stat-source">—</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Last Update</div>
            <div class="stat-value" id="stat-last" style="font-size:0.9rem;padding-top:6px">—</div>
        </div>
    </div>

    <div class="main">
        <div id="error-area"></div>

        <div class="toolbar">
            <input class="search-box" type="text" id="search" placeholder="Tìm ticket_code, nguồn..."
                oninput="renderTable()">
            <select class="filter-select" id="filter-status" onchange="renderTable()">
                <option value="">Tất cả status</option>
            </select>
            <span class="count-tag" id="count-tag"></span>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Ticket Code</th>
                        <th>Date</th>
                        <th>Grand Total</th>
                        <th>Source</th>
                        <th>Status</th>
                        <th>Preview</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td colspan="7">
                            <div class="state-box"><span class="icon">⏳</span>Đang tải dữ liệu...</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal" onclick="closeModal(event)">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modal-title">Preview</div>
                <button class="modal-close"
                    onclick="document.getElementById('modal').classList.remove('open')">✕</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cvwnfehfyotdbyxjlaqo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2d25mZWhmeW90ZGJ5eGpsYXFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxOTY4NzAsImV4cCI6MjA4NTc3Mjg3MH0.Fzg3k7TXRkagFl3nORafKw5ynkqXOCTDXjK7jafQyU0';

        let allData = [];
        let currentPage = 1;
        const PAGE_SIZE = 20;

        async function loadData() {
            document.getElementById('error-area').innerHTML = '';
            document.getElementById('table-body').innerHTML = `<tr><td colspan="7"><div class="state-box"><span class="icon">⏳</span>Đang tải...</div></td></tr>`;
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/guno_xnk_ticket?select=*&order=id.desc`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
                allData = await res.json();
                updateStats();
                populateStatusFilter();
                currentPage = 1;
                renderTable();
            } catch (err) {
                document.getElementById('error-area').innerHTML = `<div class="error-msg">⚠ Lỗi kết nối: ${err.message}</div>`;
                document.getElementById('table-body').innerHTML = `<tr><td colspan="7"><div class="state-box"><span class="icon">❌</span>Không tải được dữ liệu</div></td></tr>`;
            }
        }

        function updateStats() {
            const total = allData.length;
            const totalQty = allData.reduce((s, r) => s + (r.grand_total || 0), 0);
            const sources = [...new Set(allData.map(r => r.ticket_source).filter(Boolean))];
            const last = allData[0]?.date ? formatDate(allData[0].date) : '—';
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-qty').textContent = totalQty.toLocaleString();
            document.getElementById('stat-source').textContent = sources.length ? sources[0] : '—';
            document.getElementById('stat-last').textContent = last;
        }

        function populateStatusFilter() {
            const statuses = [...new Set(allData.map(r => r.ticket_status).filter(Boolean))];
            const sel = document.getElementById('filter-status');
            sel.innerHTML = '<option value="">Tất cả status</option>';
            statuses.forEach(s => {
                const o = document.createElement('option');
                o.value = s; o.textContent = s;
                sel.appendChild(o);
            });
        }

        function getFiltered() {
            const q = document.getElementById('search').value.toLowerCase();
            const st = document.getElementById('filter-status').value;
            return allData.filter(r => {
                const matchQ = !q || (r.ticket_code || '').toLowerCase().includes(q) || (r.ticket_source || '').toLowerCase().includes(q);
                const matchS = !st || r.ticket_status === st;
                return matchQ && matchS;
            });
        }

        function renderTable() {
            const filtered = getFiltered();
            const total = filtered.length;
            const totalPages = Math.ceil(total / PAGE_SIZE) || 1;
            if (currentPage > totalPages) currentPage = 1;

            const start = (currentPage - 1) * PAGE_SIZE;
            const rows = filtered.slice(start, start + PAGE_SIZE);

            document.getElementById('count-tag').textContent = `${total} kết quả`;

            const tbody = document.getElementById('table-body');
            if (!rows.length) {
                tbody.innerHTML = `<tr><td colspan="7"><div class="state-box"><span class="icon">🔍</span>Không có dữ liệu</div></td></tr>`;
            } else {
                tbody.innerHTML = rows.map((r, i) => `
        <tr>
          <td class="td-id">${r.id}</td>
          <td class="td-code">${r.ticket_code || '—'}</td>
          <td class="td-date">${r.date ? formatDate(r.date) : '—'}</td>
          <td class="td-total">${(r.grand_total || 0).toLocaleString()}</td>
          <td class="td-source">${r.ticket_source || '—'}</td>
          <td>${statusBadge(r.ticket_status)}</td>
          <td>${r.table_html ? `<button class="btn-preview" onclick="openModal(${r.id})">HTML ↗</button>` : '<span style="color:var(--muted);font-size:0.7rem">—</span>'}</td>
        </tr>
      `).join('');
            }

            renderPagination(totalPages);
        }

        function statusBadge(s) {
            if (!s) return `<span class="status-badge status-null">NULL</span>`;
            const cls = s.toLowerCase().includes('lưu') || s.toLowerCase().includes('done') ? 'status-active' : 'status-pending';
            return `<span class="status-badge ${cls}">${s}</span>`;
        }

        function formatDate(d) {
            const dt = new Date(d);
            return dt.toLocaleDateString('vi-VN') + ' ' + dt.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
        }

        function renderPagination(totalPages) {
            const p = document.getElementById('pagination');
            if (totalPages <= 1) { p.innerHTML = ''; return; }
            let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Prev</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
                } else if (Math.abs(i - currentPage) === 2) {
                    html += `<span style="color:var(--muted);padding:0 4px">…</span>`;
                }
            }
            html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>`;
            p.innerHTML = html;
        }

        function goPage(n) { currentPage = n; renderTable(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

        function openModal(id) {
            const row = allData.find(r => r.id === id);
            if (!row) return;
            document.getElementById('modal-title').textContent = row.ticket_code || `Ticket #${id}`;
            document.getElementById('modal-body').innerHTML = row.table_html || '<p>Không có HTML</p>';
            document.getElementById('modal').classList.add('open');
        }

        function closeModal(e) {
            if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
        }

        loadData();
    </script>
</body>

</html>
