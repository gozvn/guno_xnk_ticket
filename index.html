<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUNO — XNK Tickets</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f14;
            --surface: #13161e;
            --border: #1e2330;
            --accent: #6cc56e;
            --accent2: #3b82f6;
            --text: #e8ecf4;
            --muted: #5a6177;
            --card: #171a24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            border-bottom: 1px solid var(--border);
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
        }

        .header-logo {
            font-size: 1.05rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            color: var(--accent);
            text-transform: uppercase;
        }

        .header-logo span {
            color: var(--muted);
            font-weight: 400;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge-live {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.68rem;
            color: var(--accent);
            background: rgba(108, 197, 110, 0.08);
            border: 1px solid rgba(108, 197, 110, 0.2);
            padding: 4px 10px;
            border-radius: 4px;
        }

        .badge-live::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        .btn-refresh {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-refresh:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* SEARCH BAR */
        .search-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 28px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-bar input,
        .search-bar select {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 8px 13px;
            color: var(--text);
            font-size: 0.78rem;
            outline: none;
            transition: border-color 0.15s;
        }

        .search-bar input:focus,
        .search-bar select:focus {
            border-color: var(--accent);
        }

        .search-bar input::placeholder {
            color: var(--muted);
        }

        .input-keyword {
            flex: 1;
            min-width: 200px;
            max-width: 280px;
        }

        .input-date {
            width: 150px;
            color-scheme: dark;
        }

        .search-bar select {
            width: 160px;
            cursor: pointer;
        }

        .btn-clear {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.72rem;
            padding: 7px 13px;
            border-radius: 7px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn-clear:hover {
            border-color: #e74c3c;
            color: #e74c3c;
        }

        .count-tag {
            margin-left: auto;
            font-size: 0.7rem;
            color: var(--muted);
            white-space: nowrap;
        }

        /* MAIN */
        .main {
            padding: 24px 28px;
        }

        /* TABLE */
        .table-wrap {
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: var(--surface);
            border-bottom: 2px solid var(--border);
        }

        th {
            padding: 11px 14px;
            text-align: left;
            font-size: 0.62rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background: var(--surface);
        }

        td {
            padding: 11px 14px;
            font-size: 0.83rem;
            vertical-align: middle;
        }

        .td-id {
            font-size: 0.72rem;
            color: var(--muted);
        }

        .td-code {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--accent2);
        }

        .td-total {
            font-weight: 700;
            font-size: 0.88rem;
            color: var(--accent);
        }

        .td-date {
            font-size: 0.7rem;
            color: var(--muted);
            white-space: nowrap;
        }

        .td-time {
            font-size: 0.7rem;
            color: #a78bfa;
            white-space: nowrap;
        }

        .td-source {
            font-size: 0.78rem;
            color: var(--text);
        }

        .status-badge {
            display: inline-block;
            padding: 3px 9px;
            border-radius: 4px;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .status-null {
            background: rgba(90, 97, 119, 0.2);
            color: var(--muted);
            border: 1px solid rgba(90, 97, 119, 0.3);
        }

        .status-active {
            background: rgba(108, 197, 110, 0.1);
            color: var(--accent);
            border: 1px solid rgba(108, 197, 110, 0.25);
        }

        .status-pending {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.25);
        }

        .btn-preview {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.67rem;
            padding: 4px 9px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-preview:hover {
            border-color: var(--accent2);
            color: var(--accent2);
        }

        /* STATE */
        .state-box {
            padding: 60px;
            text-align: center;
            color: var(--muted);
            font-size: 0.8rem;
        }

        .state-box .icon {
            font-size: 2rem;
            margin-bottom: 12px;
            display: block;
        }

        /* PAGINATION */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 18px;
        }

        .page-info {
            font-size: 0.72rem;
            color: var(--muted);
        }

        .page-btns {
            display: flex;
            gap: 5px;
        }

        .page-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 0.73rem;
            padding: 6px 11px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.12s;
        }

        .page-btn:hover,
        .page-btn.active {
            border-color: var(--accent);
            color: var(--accent);
        }

        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .error-msg {
            background: rgba(231, 76, 60, 0.08);
            border: 1px solid rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            padding: 11px 15px;
            border-radius: 8px;
            font-size: 0.77rem;
            margin-bottom: 14px;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-logo">GUNO <span>/ XNK Tickets</span></div>
        <div class="header-right">
            <div class="badge-live">LIVE DB</div>
            <button class="btn-refresh" onclick="loadData()">↺ Refresh</button>
        </div>
    </div>

    <!-- SEARCH BAR -->
    <div class="search-bar">
        <input class="input-keyword" type="text" id="search" placeholder="🔍 Ticket code, nguồn..."
            oninput="onFilter()">
        <input class="input-date" type="date" id="date-from" onchange="onFilter()" title="Từ ngày">
        <input class="input-date" type="date" id="date-to" onchange="onFilter()" title="Đến ngày">
        <select id="filter-status" onchange="onFilter()">
            <option value="">Tất cả status</option>
        </select>
        <select id="filter-source" onchange="onFilter()">
            <option value="">Tất cả nguồn</option>
        </select>
        <button class="btn-clear" onclick="clearFilters()">✕ Xóa filter</button>
        <span class="count-tag" id="count-tag"></span>
    </div>

    <div class="main">
        <div id="error-area"></div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Ticket Code</th>
                        <th>Ngày</th>
                        <th>Giờ</th>
                        <th>Grand Total</th>
                        <th>Nguồn</th>
                        <th>Status</th>
                        <th>Preview</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td colspan="8">
                            <div class="state-box"><span class="icon">⏳</span>Đang tải dữ liệu...</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="modal" tabindex="-1" aria-labelledby="modal-title" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content" style="background: var(--card); border: 1px solid var(--border);">
                <div class="modal-header border-bottom-0">
                    <div class="d-flex align-items-center gap-3">
                        <h5 class="modal-title fs-5 mb-0" id="modal-title" style="color: var(--accent2); font-weight: 700;">Preview</h5>
                        <button class="btn btn-primary btn-sm" id="btn-zalo" onclick="sendZalo()">Gửi Zalo</button>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modal-body" style="background: #fff; color: #000; border-radius: 0 0 12px 12px;"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://cvwnfehfyotdbyxjlaqo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2d25mZWhmeW90ZGJ5eGpsYXFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxOTY4NzAsImV4cCI6MjA4NTc3Mjg3MH0.Fzg3k7TXRkagFl3nORafKw5ynkqXOCTDXjK7jafQyU0';

        let allData = [];
        let currentPage = 1;
        const PAGE_SIZE = 20;

        async function loadData() {
            document.getElementById('error-area').innerHTML = '';
            document.getElementById('table-body').innerHTML = `<tr><td colspan="8"><div class="state-box"><span class="icon">⏳</span>Đang tải...</div></td></tr>`;
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/guno_xnk_ticket?select=*&order=id.desc`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
                allData = await res.json();
                populateFilters();
                currentPage = 1;
                renderTable();
            } catch (err) {
                document.getElementById('error-area').innerHTML = `<div class="error-msg">⚠ Lỗi kết nối: ${err.message}</div>`;
                document.getElementById('table-body').innerHTML = `<tr><td colspan="8"><div class="state-box"><span class="icon">❌</span>Không tải được dữ liệu</div></td></tr>`;
            }
        }

        function populateFilters() {
            const statuses = [...new Set(allData.map(r => r.ticket_status).filter(Boolean))];
            const sources = [...new Set(allData.map(r => r.ticket_source).filter(Boolean))];
            const selSt = document.getElementById('filter-status');
            selSt.innerHTML = '<option value="">Tất cả status</option>';
            statuses.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; selSt.appendChild(o); });
            const selSrc = document.getElementById('filter-source');
            selSrc.innerHTML = '<option value="">Tất cả nguồn</option>';
            sources.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; selSrc.appendChild(o); });
        }

        function getFiltered() {
            const q = document.getElementById('search').value.toLowerCase().trim();
            const st = document.getElementById('filter-status').value;
            const src = document.getElementById('filter-source').value;
            const dfrom = document.getElementById('date-from').value;   // yyyy-mm-dd
            const dto = document.getElementById('date-to').value;

            return allData.filter(r => {
                if (q && !(r.ticket_code || '').toLowerCase().includes(q) && !(r.ticket_source || '').toLowerCase().includes(q)) return false;
                if (st && r.ticket_status !== st) return false;
                if (src && r.ticket_source !== src) return false;
                if (r.date) {
                    const d = r.date.substring(0, 10); // yyyy-mm-dd
                    if (dfrom && d < dfrom) return false;
                    if (dto && d > dto) return false;
                }
                return true;
            });
        }

        function onFilter() { currentPage = 1; renderTable(); }

        function clearFilters() {
            document.getElementById('search').value = '';
            document.getElementById('date-from').value = '';
            document.getElementById('date-to').value = '';
            document.getElementById('filter-status').value = '';
            document.getElementById('filter-source').value = '';
            onFilter();
        }

        function renderTable() {
            const filtered = getFiltered();
            const total = filtered.length;
            const totalPages = Math.ceil(total / PAGE_SIZE) || 1;
            if (currentPage > totalPages) currentPage = 1;
            const start = (currentPage - 1) * PAGE_SIZE;
            const rows = filtered.slice(start, start + PAGE_SIZE);

            document.getElementById('count-tag').textContent = `${total} kết quả`;

            const tbody = document.getElementById('table-body');
            if (!rows.length) {
                tbody.innerHTML = `<tr><td colspan="8"><div class="state-box"><span class="icon">🔍</span>Không có dữ liệu</div></td></tr>`;
            } else {
                tbody.innerHTML = rows.map(r => {
                    const dt = r.date ? new Date(r.date) : null;
                    const dateStr = dt ? dt.toLocaleDateString('vi-VN') : '—';
                    const timeStr = dt ? dt.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '—';
                    return `<tr>
          <td class="td-id">${r.id}</td>
          <td class="td-code">${r.table_html ? `<a href="#" onclick="openModal(${r.id}); return false;" style="text-decoration: underline; color: inherit; cursor: pointer;">${r.ticket_code || '—'}</a>` : (r.ticket_code || '—')}</td>
          <td class="td-date">${dateStr}</td>
          <td class="td-time">${timeStr}</td>
          <td class="td-total">${(r.grand_total || 0).toLocaleString()}</td>
          <td class="td-source">${r.ticket_source || '—'}</td>
          <td>${statusBadge(r.ticket_status)}</td>
          <td>${r.table_html ? `<button class="btn-preview" onclick="openModal(${r.id})">HTML ↗</button>` : '<span style="color:var(--muted);font-size:0.7rem">—</span>'}</td>
        </tr>`;
                }).join('');
            }
            renderPagination(total, totalPages);
        }

        function statusBadge(s) {
            if (!s) return `<span class="status-badge status-null">NULL</span>`;
            const cls = s.toLowerCase().includes('lưu') || s.toLowerCase().includes('done') ? 'status-active' : 'status-pending';
            return `<span class="status-badge ${cls}">${s}</span>`;
        }

        function renderPagination(total, totalPages) {
            const p = document.getElementById('pagination');
            if (totalPages <= 1) { p.innerHTML = ''; return; }
            const start = (currentPage - 1) * PAGE_SIZE + 1;
            const end = Math.min(currentPage * PAGE_SIZE, total);
            let html = `<div class="page-info">Hiển thị ${start}–${end} / ${total}</div><div class="page-btns">`;
            html += `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Prev</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
                } else if (Math.abs(i - currentPage) === 2) {
                    html += `<span style="color:var(--muted);padding:0 4px;line-height:2">…</span>`;
                }
            }
            html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button></div>`;
            p.innerHTML = html;
        }

        function goPage(n) { currentPage = n; renderTable(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

        let currentModalTicketId = null;
        let bsModal = null;

        function openModal(id) {
            const row = allData.find(r => r.id === id);
            if (!row) return;
            currentModalTicketId = id;
            document.getElementById('modal-title').textContent = row.ticket_code || `Ticket #${id}`;
            document.getElementById('modal-body').innerHTML = row.table_html || '<p>Không có HTML</p>';
            
            // Dùng CSS Bootstrap mặc định để căn giữa và responsive ảnh
            document.querySelectorAll('#modal-body img').forEach(img => {
                img.classList.add('img-fluid', 'mx-auto', 'd-block', 'rounded');
            });
            
            if (!bsModal) {
                bsModal = new bootstrap.Modal(document.getElementById('modal'));
            }
            bsModal.show();
        }

        async function sendZalo() {
            if (!currentModalTicketId) return;
            const row = allData.find(r => r.id === currentModalTicketId);
            if (!row) return;

            const btn = document.getElementById('btn-zalo');
            const originalText = btn.textContent;
            btn.textContent = 'Đang gửi...';
            btn.disabled = true;

            try {
                const response = await fetch('https://n8n.guno.club/webhook/60044809-5570-462b-b83c-c387646d8a4b', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(row)
                });
                if (!response.ok) throw new Error('Gửi webhook thất bại');
                alert('Đã gửi thông tin qua Zalo thành công!');
            } catch (err) {
                alert('Lỗi khi gửi Zalo: ' + err.message);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        loadData();
    </script>
</body>

</html>
